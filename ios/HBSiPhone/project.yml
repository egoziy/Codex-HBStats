name: HBSiPhone
options:
  bundleIdPrefix: com.hbs
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: HBSiPhone
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    INFOPLIST_FILE: HBSiPhone/Resources/Info.plist
targets:
  HBSiPhone:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - DesignSystem
      - Networking
      - Models
      - Features
      - HBSiPhone/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hbs.iphone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    scheme:
      testTargets: []
