<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Background circle matching existing nav icons -->
  <circle cx="48" cy="48" r="46" fill="#5a1a1a"/>
  <circle cx="48" cy="48" r="43" fill="#7f1d1d" stroke="#d4a843" stroke-width="2.5"/>
  <!-- Crystal ball / prediction icon -->
  <!-- Base stand -->
  <rect x="36" y="64" width="24" height="4" rx="2" fill="#d4a843"/>
  <rect x="40" y="60" width="16" height="6" rx="2" fill="#c49a38"/>
  <!-- Ball -->
  <circle cx="48" cy="42" r="18" fill="none" stroke="#f5e6b8" stroke-width="2.5"/>
  <circle cx="48" cy="42" r="18" fill="#f5e6b8" opacity="0.15"/>
  <!-- Chart inside ball (prediction graph) -->
  <polyline points="36,48 42,44 48,38 54,42 60,34" fill="none" stroke="#f5e6b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow up -->
  <polygon points="60,34 57,38 63,38" fill="#d4a843"/>
  <!-- Sparkle dots -->
  <circle cx="38" cy="32" r="1.5" fill="#d4a843"/>
  <circle cx="56" cy="28" r="1.5" fill="#d4a843"/>
</svg>
